<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cinemania - Movie Catalog">
  <title>Catalog - Cinemania</title>
</head>
<body>
  <div id="root">
    <header id="header" class="header-main">
      <div class="container">
        <div class="header-content">
          <h1 class="header-title"><a href="/" class="logo-link">Cinemania</a></h1>
          <nav class="header-nav">
            <a href="/src/pages/home/" class="nav-link">Home</a>
            <a href="/src/pages/catalog/" class="nav-link active">Catalog</a>
            <a href="/src/pages/library/" class="nav-link">My Library</a>
          </nav>
        </div>
      </div>
    </header>

    <nav id="mobile-menu" class="mobile-menu"></nav>
    
    <main id="main">
      <!-- Hero section -->
      <section id="hero" class="hero">
        <div class="container">
          <div class="hero-content">
            <h1 class="hero-title">Movie Catalog</h1>
            <p class="hero-subtitle">Browse and discover movies</p>
          </div>
        </div>
      </section>
      
      <!-- Search form -->
      <section id="search-bar" class="search-section">
        <div class="container">
          <div class="search-form placeholder">
            <input type="text" class="search-input" placeholder="Search movies...">
            <button class="search-btn">Search</button>
          </div>
        </div>
      </section>
      
      <!-- Movie list -->
      <section id="movie-list" class="movie-list">
        <div class="container">
          <div class="movies-grid placeholder">
            <div class="movie-card-placeholder">Movie 1</div>
            <div class="movie-card-placeholder">Movie 2</div>
            <div class="movie-card-placeholder">Movie 3</div>
            <div class="movie-card-placeholder">Movie 4</div>
            <div class="movie-card-placeholder">Movie 5</div>
            <div class="movie-card-placeholder">Movie 6</div>
          </div>
        </div>
      </section>
      
      <!-- Pagination -->
      <section id="pagination" class="pagination-section">
        <div class="container">
          <div class="pagination placeholder">
            <button class="pagination-btn">Previous</button>
            <span class="pagination-info">Page 1 of 10</span>
            <button class="pagination-btn">Next</button>
          </div>
        </div>
      </section>
    </main>
    
    <footer id="footer" class="footer">
      <div class="container">
        <p class="footer-text">&copy; 2024 Cinemania. All rights reserved.</p>
      </div>
    </footer>
  </div>

  <script type="module" src="/src/js/catalog.js"></script>
</body>
</html>
