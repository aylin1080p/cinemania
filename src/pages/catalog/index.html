<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cinemania - Movie Catalog">
  <title>Catalog - Cinemania</title>
</head>
<body>
  <div id="root">

    <!-- [owner: unassigned] → header.js -->
    <header id="header" class="header" data-dev="Header Section">
      <div class="container">
        <div class="header__inner">
          <a href="/" class="header__logo logo-link">
            <img src="/images/logos/logo-main.svg" alt="Cinemania" class="nav-logo">
          </a>
          <nav class="header__nav">
            <a href="/src/pages/home/" class="nav-link">Home</a>
            <a href="/src/pages/catalog/" class="nav-link active">Catalog</a>
            <a href="/src/pages/library/" class="nav-link">My Library</a>
          </nav>
          <div class="header__controls">
            <!-- theme toggle rendered by header.js -->
          </div>
          <button class="header__burger" id="menuToggle" aria-label="Open menu">
            <!-- burger icon rendered by header.js -->
          </button>
        </div>
      </div>
    </header>

    <!-- [owner: unassigned] → mobile-menu.js -->
    <div id="mobile-menu" class="mobile-menu" data-dev="Mobile Menu"></div>

    <main id="main">

      <!-- [owner: unassigned] → hero.js -->
      <!-- Full-viewport featured movie: backdrop image + content overlay -->
      <section id="hero" class="hero" data-dev="Hero Section">
        <div class="hero__backdrop">
          <!-- movie backdrop image rendered by hero.js -->
        </div>
        <div class="container">
          <div class="hero__content">
            <!-- movie title, rating, description, action buttons rendered by hero.js -->
          </div>
        </div>
      </section>

      <!-- [owner: unassigned] → search-bar.js -->
      <!-- Search input + submit button -->
      <section id="search-bar" class="search-section" data-dev="Search Bar Section">
        <div class="container">
          <form class="search-form" id="searchForm" role="search">
            <input
              type="text"
              class="search-input"
              id="searchInput"
              placeholder="Search movies..."
              aria-label="Search movies"
            >
            <button type="submit" class="search-btn" id="searchButton">Search</button>
          </form>
        </div>
      </section>

      <!-- [owner: unassigned] → movie-list.js + pagination.js -->
      <!-- Filter controls + movie cards grid + pagination -->
      <section id="movie-list" class="movie-list" data-dev="Movie List Section">
        <div class="container">
          <div class="catalog-filters" id="catalogFilters" data-dev="Filter Bar">
            <!-- genre filter dropdown, year filter dropdown, show button
                 rendered by movie-list.js -->
          </div>
          <div class="movies-grid" id="movieListGrid">
            <!-- movie cards rendered by movie-list.js -->
          </div>
          <div class="pagination" id="pagination" data-dev="Pagination">
            <!-- pagination controls rendered by pagination.js -->
          </div>
        </div>
      </section>

    </main>

    <!-- [owner: unassigned] → footer.js -->
    <footer id="footer" class="footer" data-dev="Footer Section">
      <div class="container">
        <!-- footer content rendered by footer.js -->
      </div>
    </footer>

  </div>

  <script type="module" src="/src/js/catalog.js"></script>
</body>
</html>
