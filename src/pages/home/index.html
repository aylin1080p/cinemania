<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cinemania - Home Page">
  <title>Home - Cinemania</title>
</head>
<body>
  <div id="root">

    <!-- [owner: unassigned] → header.js -->
    <header id="header" class="header" data-dev="Header Section">
      <div class="container">
        <div class="header__inner">
          <a href="/" class="header__logo logo-link">
            <img src="/images/logos/logo-main.svg" alt="Cinemania" class="nav-logo">
          </a>
          <nav class="header__nav">
            <a href="/src/pages/home/" class="nav-link active">Home</a>
            <a href="/src/pages/catalog/" class="nav-link">Catalog</a>
            <a href="/src/pages/library/" class="nav-link">My Library</a>
          </nav>
          <div class="header__controls">
            <!-- theme toggle rendered by header.js -->
          </div>
          <button class="header__burger" id="menuToggle" aria-label="Open menu">
            <!-- burger icon rendered by header.js -->
          </button>
        </div>
      </div>
    </header>

    <!-- [owner: unassigned] → mobile-menu.js -->
    <div id="mobile-menu" class="mobile-menu" data-dev="Mobile Menu"></div>

    <main id="main">

      <!-- [owner: unassigned] → hero.js -->
      <!-- Full-viewport featured movie: backdrop image + content overlay -->
      <section id="hero" class="hero" data-dev="Hero Section">
        <div class="hero__backdrop">
          <!-- movie backdrop image rendered by hero.js -->
        </div>
        <div class="container">
          <div class="hero__content">
            <!-- movie title, rating, description, action buttons rendered by hero.js -->
          </div>
        </div>
      </section>

      <!-- [owner: unassigned] → weekly-trends.js -->
      <!-- Horizontal strip of trending movie cards -->
      <section id="weekly-trends" class="weekly-trends" data-dev="Weekly Trends Section">
        <div class="container">
          <div class="section-header">
            <h2 class="section-title">Weekly Trends</h2>
            <a href="#" class="see-all" id="weeklyTrendsSeeAll">
              <!-- "See all" link rendered by weekly-trends.js -->
            </a>
          </div>
          <div class="movies-strip" id="weeklyTrendsList">
            <!-- movie cards rendered by weekly-trends.js -->
          </div>
        </div>
      </section>

      <!-- [owner: unassigned] → upcoming.js -->
      <!-- Featured single movie: poster image left + details panel right -->
      <section id="upcoming" class="upcoming" data-dev="Upcoming This Month Section">
        <div class="container">
          <div class="section-header">
            <h2 class="section-title">Upcoming This Month</h2>
          </div>
          <div class="upcoming__featured" id="upcomingFeatured">
            <div class="upcoming__poster">
              <!-- movie poster image rendered by upcoming.js -->
            </div>
            <div class="upcoming__details">
              <!-- movie title, release date, runtime, popularity,
                   genre, about text, "Add to my library" button
                   rendered by upcoming.js -->
            </div>
          </div>
        </div>
      </section>

    </main>

    <!-- [owner: unassigned] → footer.js -->
    <footer id="footer" class="footer" data-dev="Footer Section">
      <div class="container">
        <!-- footer content rendered by footer.js -->
      </div>
    </footer>

  </div>

  <script type="module" src="/src/js/home.js"></script>
</body>
</html>
