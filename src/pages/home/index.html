<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cinemania - Home Page">
  <title>Home - Cinemania</title>
</head>
<body>
  <div id="root">
    <header id="header" class="header-main">
      <div class="container">
        <div class="header-content">
          <h1 class="header-title"><a href="/" class="logo-link">Cinemania</a></h1>
          <nav class="header-nav">
            <a href="/src/pages/home/" class="nav-link active">Home</a>
            <a href="/src/pages/catalog/" class="nav-link">Catalog</a>
            <a href="/src/pages/library/" class="nav-link">My Library</a>
          </nav>
        </div>
      </div>
    </header>

    <nav id="mobile-menu" class="mobile-menu"></nav>
    
    <main id="main">
      <!-- Hero section -->
      <section id="hero" class="hero">
        <div class="container">
          <div class="hero-content">
            <h1 class="hero-title">Discover Cinema</h1>
            <p class="hero-subtitle">Find your next favorite movie</p>
          </div>
        </div>
      </section>
      
      <!-- Weekly trends -->
      <section id="weekly-trends" class="weekly-trends">
        <div class="container">
          <h2 class="section-title">Weekly Trends</h2>
          <div class="movies-grid placeholder">
            <div class="movie-card-placeholder">Trending Movie 1</div>
            <div class="movie-card-placeholder">Trending Movie 2</div>
            <div class="movie-card-placeholder">Trending Movie 3</div>
            <div class="movie-card-placeholder">Trending Movie 4</div>
          </div>
        </div>
      </section>
      
      <!-- Upcoming movies -->
      <section id="upcoming" class="upcoming">
        <div class="container">
          <h2 class="section-title">Upcoming Releases</h2>
          <div class="movies-grid placeholder">
            <div class="movie-card-placeholder">Upcoming Movie 1</div>
            <div class="movie-card-placeholder">Upcoming Movie 2</div>
            <div class="movie-card-placeholder">Upcoming Movie 3</div>
            <div class="movie-card-placeholder">Upcoming Movie 4</div>
          </div>
        </div>
      </section>
    </main>
    
    <footer id="footer" class="footer">
      <div class="container">
        <p class="footer-text">&copy; 2024 Cinemania. All rights reserved.</p>
      </div>
    </footer>
  </div>

  <script type="module" src="/src/js/home.js"></script>
</body>
</html>
