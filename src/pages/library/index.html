<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cinemania - My Library">
  <title>My Library - Cinemania</title>
</head>
<body>
  <div id="root">

    <!-- [owner: unassigned] → header.js -->
    <header id="header" class="header" data-dev="Header Section">
      <div class="container">
        <div class="header__inner">
          <a href="/" class="header__logo logo-link">
            <img src="/images/logos/logo-main.svg" alt="Cinemania" class="nav-logo">
          </a>
          <nav class="header__nav">
            <a href="/src/pages/home/" class="nav-link">Home</a>
            <a href="/src/pages/catalog/" class="nav-link">Catalog</a>
            <a href="/src/pages/library/" class="nav-link active">My Library</a>
          </nav>
          <div class="header__controls">
            <!-- theme toggle rendered by header.js -->
          </div>
          <button class="header__burger" id="menuToggle" aria-label="Open menu">
            <!-- burger icon rendered by header.js -->
          </button>
        </div>
      </div>
    </header>

    <!-- [owner: unassigned] → mobile-menu.js -->
    <div id="mobile-menu" class="mobile-menu" data-dev="Mobile Menu"></div>

    <main id="main">

      <!-- [owner: unassigned] → library-list.js -->
      <!-- WATCHED / QUEUE tab switcher — no hero on this page -->
      <section id="library-tabs" class="library-tabs" data-dev="Library Tabs Section">
        <div class="container">
          <div class="library-tabs__controls" id="libraryTabControls">
            <!-- WATCHED and QUEUE tab buttons rendered by library-list.js -->
          </div>
        </div>
      </section>

      <!-- [owner: unassigned] → library-list.js -->
      <!-- Grid of saved movies for the active tab (Watched or Queue) -->
      <section id="library-list" class="library-list" data-dev="Library List Section">
        <div class="container">
          <div class="movies-grid" id="libraryListGrid">
            <!-- movie cards rendered by library-list.js -->
          </div>
        </div>
      </section>

    </main>

    <!-- [owner: unassigned] → footer.js -->
    <footer id="footer" class="footer" data-dev="Footer Section">
      <div class="container">
        <!-- footer content rendered by footer.js -->
      </div>
    </footer>

  </div>

  <script type="module" src="/src/js/library.js"></script>
</body>
</html>
