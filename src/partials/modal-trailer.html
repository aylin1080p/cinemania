<!-- Trailer Modal Partial -->
<!-- Modal for playing movie trailers -->
<div class="modal modal--trailer" id="trailerModal">
  <div class="modal__overlay" id="trailerModalOverlay"></div>
  <div class="modal__content">
    <button class="modal__close" id="trailerModalClose">
      <span>&times;</span>
    </button>
    <div class="modal__body">
      <!-- Trailer video will be embedded here -->
    </div>
  </div>
</div>
