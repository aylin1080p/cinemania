<!-- Pagination Partial -->
<!-- Navigation for paginated results -->
<div class="pagination">
  <div class="pagination__container">
    <button class="pagination__button pagination__button--prev" id="prevPage">
      Previous
    </button>
    <div class="pagination__info" id="pageInfo">
      Page <span id="currentPage">1</span> of <span id="totalPages">1</span>
    </div>
    <button class="pagination__button pagination__button--next" id="nextPage">
      Next
    </button>
  </div>
</div>
